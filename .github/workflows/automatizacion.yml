name: Ejecutar Modelo Cuantitativo Europeo

# El robot se activa cada vez que haces un "commit" o subes archivos (push)
on: [push]

jobs:
  analisis:
    # Usamos la última versión estable de Ubuntu
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar librerías necesarias
        # Instalamos pandas para los CSV y el nuevo SDK de Google GenAI
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pandas scipy

      - name: Ejecutar motor de predicción
        # Aquí pasamos tu API Key de forma segura desde los Secrets de GitHub
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python prediccion.py
