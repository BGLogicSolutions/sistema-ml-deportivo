name: Ejecutar Modelo Cuantitativo Europeo

on:
  schedule:
    # Esto le dice al robot que corra todos los días a las 10:00 AM (Hora UTC) / Aprox 4:00 AM (CDMX)
    - cron: '0 10 * * *'
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analisis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar entorno de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pandas scipy

      - name: Ejecutar motor de predicción
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python prediccion.py

      - name: Guardar reporte generado
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add REPORTE_EUROPEO.md
          git add BITACORA.txt # <-- Agregamos esta línea
          git commit -m "📊 Análisis y Auditoría Diaria" || echo "Sin cambios"
          git pull --rebase origin main
          git push
