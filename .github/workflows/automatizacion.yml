name: Agente Autónomo Cuantitativo

on:
  push:
    paths:
      - '**.csv' # Se ejecuta al detectar nuevos resultados
  workflow_dispatch: # Botón para forzar la ejecución manual
  schedule:
    - cron: '0 12 * * *' # Se ejecuta diario a las 12:00 UTC (opcional)

jobs:
  analisis_diario:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v3

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ⚙️ Instalar librerías
      run: |
        python -m pip install --upgrade pip
        pip install pandas google-genai

    - name: 🚀 Ejecutar Cerebro Cuantitativo
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python prediccion.py

    - name: 💾 Guardar Reporte y Bitácora en el Repositorio
      run: |
        git config --global user.name "Bot Cuantitativo"
        git config --global user.email "bot@bgsolutions.com"
        git add REPORTE_EUROPEO.md BITACORA.txt
        # Solo hace el commit si hay cambios reales en los archivos
        git commit -m "🤖 Actualización diaria: Reporte y Bitácora" || echo "No hay cambios para guardar"
        git push
