name: Motor de Backtesting Poisson

on:
  push:
    paths:
      - '**.csv'
  workflow_dispatch:

jobs:
  auditoria:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v3

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ⚙️ Instalar librerías matemáticas y de red
      run: |
        python -m pip install --upgrade pip
        pip install pandas scipy matplotlib requests

    - name: 🚀 Ejecutar Auditoría y Mandar Alerta
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python backtesting/evaluacion_poisson.py
