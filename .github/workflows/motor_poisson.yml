name: Motor de Backtesting Poisson

on:
  push:
    paths:
      - '**.csv' # El bot solo se despierta si detecta un CSV nuevo
  workflow_dispatch: # Botón manual por si quieres correrlo a la brava

jobs:
  auditoria:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v3

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ⚙️ Instalar librerías matemáticas
      run: |
        python -m pip install --upgrade pip
        pip install pandas scipy matplotlib

    - name: 🚀 Ejecutar Auditoría y Criterio de Kelly
      run: python backtesting/evaluacion_poisson.py
